<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>InfiniteSenseLab</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background:linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color:#e2e8f0;
            min-height:100vh;
        }

        .bg-grid{
            position:fixed;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size:60px 60px;
            pointer-events:none;
            z-index:0;
        }

        .container{
            position:relative;
            z-index:1;
            max-width:900px;
            margin:0 auto;
            padding:80px 24px;
        }

        .brand{
            text-align:center;
            margin-bottom:64px;
        }

        .brand-icon{
            width:72px;
            height:72px;
            margin:0 auto 20px;
            background:linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius:20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:32px;
            box-shadow:0 8px 40px rgba(99,102,241,0.35);
        }

        .brand h1{
            font-size:42px;
            font-weight:800;
            letter-spacing:-0.5px;
            background:linear-gradient(135deg, #e2e8f0, #a5b4fc);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }

        .brand p{
            margin-top:12px;
            font-size:16px;
            color:#94a3b8;
            letter-spacing:0.5px;
        }

        .cards{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:24px;
        }

        .card{
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            padding:36px;
            text-decoration:none;
            color:inherit;
            backdrop-filter:blur(10px);
            transition:all 0.3s ease;
            position:relative;
            overflow:hidden;
        }

        .card::before{
            content:'';
            position:absolute;
            inset:0;
            background:linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.08));
            opacity:0;
            transition:opacity 0.3s;
        }

        .card:hover{
            transform:translateY(-6px);
            border-color:rgba(99,102,241,0.4);
            box-shadow:0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.2);
        }

        .card:hover::before{
            opacity:1;
        }

        .card-icon{
            font-size:40px;
            margin-bottom:16px;
            position:relative;
            z-index:1;
        }

        .card-title{
            font-size:22px;
            font-weight:700;
            margin-bottom:8px;
            position:relative;
            z-index:1;
            color:#f1f5f9;
        }

        .card-desc{
            font-size:14px;
            color:#94a3b8;
            line-height:1.6;
            position:relative;
            z-index:1;
        }

        .card-tag{
            display:inline-block;
            margin-top:16px;
            padding:4px 10px;
            border-radius:6px;
            font-size:11px;
            font-weight:600;
            background:rgba(99,102,241,0.2);
            color:#a5b4fc;
            position:relative;
            z-index:1;
        }

        .footer{
            text-align:center;
            margin-top:64px;
            padding-top:32px;
            border-top:1px solid rgba(255,255,255,0.06);
        }

        .footer a{
            color:#818cf8;
            text-decoration:none;
            font-weight:600;
        }

        .footer a:hover{
            text-decoration:underline;
        }

        .footer span{
            color:#64748b;
            font-size:14px;
        }

        @media(max-width:640px){
            .cards{
                grid-template-columns:1fr;
            }
            .brand h1{
                font-size:32px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <h1>InfiniteSenseLab</h1>
            <p>嵌入式调试与配置工具集</p>
        </div>

        <div class="cards">
            <a href="SimpleMotor.html" class="card">
                <div class="card-icon">⚙️</div>
                <div class="card-title">SimpleMotor Studio</div>
                <div class="card-desc">电机控制与调试工具，支持速度/PWM双模式，PID参数实时配置</div>
                <span class="card-tag">控制面板</span>
            </a>

            <a href="SimpleSensorSync.html" class="card">
                <div class="card-icon">🔗</div>
                <div class="card-title">SimpleSensorSync Studio</div>
                <div class="card-desc">多传感器同步板配置工具，支持触发频率、脉宽与串口参数配置</div>
                <span class="card-tag">配置工具</span>
            </a>
        </div>

        <div class="footer">
            <span>
                <a href="https://github.com/InfiniteSenseLab" target="_blank">InfiniteSenseLab</a>
                &nbsp;&middot;&nbsp;
                <a href="https://github.com/InfiniteSenseLab/SimpleMotor" target="_blank">SimpleMotor</a>
                &nbsp;&middot;&nbsp;
                <a href="https://github.com/InfiniteSenseLab/SimpleSensorSync" target="_blank">SimpleSensorSync</a>
            </span>
        </div>
    </div>
</body>
</html>
